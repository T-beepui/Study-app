<!DOCTYPE html>
<html>
<head>
  <title>StudyFlow</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }
    h1 { text-align: center; }

    input, button {
      padding: 10px;
      margin: 5px;
      border-radius: 8px;
      border: none;
    }

    .box {
      border: 1px solid white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }

    .done {
      text-decoration: line-through;
      color: gray;
    }
  </style>
</head>

<body>

<h1>StudyFlow</h1>

<h2>Add Subject</h2>
<input id="subjectInput" placeholder="Enter subject">
<button onclick="addSubject()">Add</button>

<div id="subjects"></div>

<script>
let data = JSON.parse(localStorage.getItem("study")) || [];

function save() {
  localStorage.setItem("study", JSON.stringify(data));
}

function addSubject() {
  let val = document.getElementById("subjectInput").value;
  if (!val) return;

  data.push({ name: val, topics: [] });
  document.getElementById("subjectInput").value = "";
  save();
  render();
}

function addTopic(i) {
  let val = prompt("Enter topic");
  if (!val) return;

  data[i].topics.push({ name: val, done: false });
  save();
  render();
}

function toggle(i, j) {
  data[i].topics[j].done = !data[i].topics[j].done;
  save();
  render();
}

function render() {
  let html = "";

  data.forEach((sub, i) => {
    html += `<div class="box">
      <h3>${sub.name}</h3>
      <button onclick="addTopic(${i})">+ Add Topic</button>
      <ul>`;

    sub.topics.forEach((t, j) => {
      html += `<li class="${t.done ? "done" : ""}"
        onclick="toggle(${i}, ${j})">
        ${t.name}
      </li>`;
    });

    html += `</ul></div>`;
  });

  document.getElementById("subjects").innerHTML = html;
}

render();
</script>

</body>
</html>
